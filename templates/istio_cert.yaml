apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ index .Values "istio" "cert" }}
  namespace: istio-system
spec:
  secretName: {{ index .Values "istio" "secret" }}
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
  - "{{ index .Values "istio" "host" }}"
  issuerRef:
    name: {{ index .Values "istio" "issuer" }}
    # We can reference ClusterIssuers by changing the kind here.
    # The default value is Issuer (i.e. a locally namespaced Issuer)
    kind: Issuer
    group: cert-manager.io
