name: Helm Docs

on:
  pull_request:
    paths:
      - "values.yaml"
      - "README.md"
      - "Chart.yaml"
      - ".github/workflows/helm-docs.yml"

jobs:
  helm-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Install helm-docs
        run: |
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz -o helm-docs.tar.gz
          tar -xzf helm-docs.tar.gz
          chmod +x helm-docs
          sudo mv helm-docs /usr/local/bin/

      - name: Generate docs
        run: helm-docs

      - name: Commit and Push changes
        run: |
          # 1. Configure the git user as the official GitHub Actions Bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 2. Add the README file
          git add README.md

          # 3. Check if there are changes. If yes, commit and push.
          if ! git diff-index --quiet HEAD; then
            echo "Changes detected in README.md. Committing..."
            git commit -m "docs: Auto-generate README.md via helm-docs"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi